<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents – QuadX 6299</title>
  <link rel="icon" type="image/webp" href="GOLD-Logo.webp">
  <script src="shared.js"></script>
      <link rel="stylesheet" href="style.css">
  <style>

    body {
      margin: 0;
      overflow-x: hidden;
      min-height: 100vh;
      font-family: var(--font-primary);
      color: #fff;
      background: #111 url(website-background.webp) no-repeat center center fixed;
      background-size: cover;
    }

    /* Restores your global link color without the extra style tag in the body */
    a { color: white; text-decoration: none; }

    main { padding-top: var(--nav-h); }

    /* --- CLEANED DOCUMENTS CSS --- */

/* 1. SCROLL REVEAL (Staggered timing unified in previous turn) */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal { opacity: 0; transform: translateY(32px); }
.reveal.visible { animation: fadeSlideUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.reveal.d1 { animation-delay: 0.1s; }
.reveal.d2 { animation-delay: 0.2s; }
.reveal.d3 { animation-delay: 0.3s; }
.reveal.d4 { animation-delay: 0.4s; }
.reveal.d5 { animation-delay: 0.5s; }

#docs-page {
  padding: 60px 5% 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.page-header {
  text-align: center;
  margin-bottom: 56px;
  padding-top: 40px;
}

.section-label {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  margin-bottom: 14px;
}

.page-title {
  font-weight: 900;
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  margin: 0 0 14px;
  line-height: 1;
  background: linear-gradient(90deg, #ffd748 0%, #D4AF37 40%, #FFD700 70%, #b8860b 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.page-subtitle {
  font-size: 1rem;
  color: rgba(255,255,255,0.5);
  max-width: 460px;
  line-height: 1.7;
  margin: 0 auto;
}

.docs-grid, #document-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 880px;
}

/* 2. DOC CARD (Layout only - inherit Glass look) */
.doc-card {
  position: relative;
  border-radius: 20px;
  padding: 32px 28px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  color: #fff;
  overflow: hidden;
}

/* Specific Doc Hover Overlays */
.doc-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.8), transparent);
  opacity: 0;
  filter: blur(1px);
  transition: opacity 0.4s ease;
}

.doc-card:hover {
  /* scale/translate merged with glass-effect hover */
  border-color: rgba(212, 175, 55, 0.5);
  background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
}

.doc-card:hover::before { opacity: 1; }

/* 3. DOC ICON */
.doc-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2) 0%, rgba(212, 175, 55, 0.15) 100%);
  border-color: rgba(212, 175, 55, 0.4);
}

.doc-card:hover .doc-icon {
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.35) 0%, rgba(212, 175, 55, 0.25) 100%);
  border-color: rgba(212, 175, 55, 0.8);
  transform: scale(1.05);
}

.doc-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--gold);
  fill: none;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.4));
  transition: transform 0.3s ease;
}

.doc-card:hover .doc-icon svg {
  transform: scale(1.1);
  filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
}

.doc-type {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.75;
  margin-bottom: 6px;
}

.doc-name {
  font-weight: 900;
  font-size: 1.25rem;
  margin: 0 0 6px;
  line-height: 1.2;
}

.doc-desc {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.55);
  line-height: 1.6;
  margin: 0;
}

.doc-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

/* 4. DOC FORMAT TAG */
.doc-format {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

.doc-card:hover .doc-format {
  border-color: rgba(212, 175, 55, 0.5);
  background: rgba(212, 175, 55, 0.1);
}

.doc-arrow {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  transition: all 0.2s;
}

.doc-arrow svg {
  width: 12px;
  height: 12px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.2s;
}

.doc-card:hover .doc-arrow { color: var(--gold); gap: 8px; }
.doc-card:hover .doc-arrow svg { transform: translateX(2px); }

.gold-divider, .section-divider {
  width: 90%;
  max-width: 880px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
  border: none;
  margin: 60px auto 0;
}

.section-divider { max-width: 1100px; margin: 0 auto; }

/* 5. CONTACT NUDGE (Layout) */
.contact-nudge {
  margin-top: 64px;
  width: 100%;
  max-width: 880px;
  border-radius: 24px;
  padding: 32px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  position: relative;
}

.contact-nudge::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.08), transparent 50%);
  pointer-events: none;
}

.nudge-text h3 {
  font-weight: 900;
  font-size: 1.1rem;
  margin: 0 0 6px;
}

.nudge-text p {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.5);
  margin: 0;
}

/* 6. NUDGE BUTTON */
.nudge-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
  font-weight: 800;
  font-size: 0.85rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 8px;
  white-space: nowrap;
  background: radial-gradient(circle at 30% 0%, rgba(255, 215, 0, 0.3) 0%, rgba(212, 175, 55, 0.1) 100%);
  border-color: rgba(212, 175, 55, 0.5);
}

.nudge-btn:hover {
  background: radial-gradient(circle at 30% 0%, rgba(255, 215, 0, 0.5) 0%, rgba(212, 175, 55, 0.3) 100%);
  border-color: rgba(212, 175, 55, 0.9);
}

@media (max-width: 620px) {
  .docs-grid, #document-container { grid-template-columns: 1fr; }
  .contact-nudge { flex-direction: column; text-align: center; }
}

  </style>
</head>
<body>
  <div id="nav-mount"></div>

  <main id="docs-page">

    <!-- ── PAGE HEADER ── -->
    <header class="page-header">
      <span class="section-label reveal">Resources</span>
      <h1 class="page-title reveal d1">DOCUMENTS</h1>
      <p class="page-subtitle reveal d2">Here are our official resources by QuadX 6299 including sponsorship information, volunteering information, and information to get you started in FTC</p>
    </header>

    <!-- ── DOC CARDS ── -->

      <div id="document-container" class="doc-grid"></div>

    </div><!-- /docs-grid -->

    <!-- ── GOLD DIVIDER ── -->
    <hr class="gold-divider reveal">

    <!-- ── CONTACT NUDGE ── -->
    <div class="contact-nudge glass-effect reveal">
      <div class="nudge-text">
        <h3>Have any questions?</h3>
        <p>Reach out directly and we'll get you what you need.</p>
      </div>
      <a href="mailto:teamquadx6299@gmail.com" class="nudge-btn glass-effect">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Contact Us
      </a>
    </div>

  </main>

  <div class="section-divider"></div>

<div id="footer-mount"></div>

<script src="docs.js"></script>

  <script>
    function initializeComponents() {
      if (typeof renderNav === 'function' && typeof renderFooter === 'function') {
        renderNav('docs');
        renderFooter();
      } else {
        setTimeout(initializeComponents, 100);
      }
    }
    document.addEventListener('DOMContentLoaded', initializeComponents);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
