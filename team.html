<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team – QuadX 6299</title>
  <link rel="icon" type="image/webp" href="GOLD-Logo.webp">
  <script src="shared.js"></script>
      <link rel="stylesheet" href="style.css">
  <style>


    /* ── SCROLL REVEAL ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal { opacity: 0; transform: translateY(32px); }
    .reveal.visible { animation: fadeSlideUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .reveal.d1 { animation-delay: 0.06s; }
    .reveal.d2 { animation-delay: 0.12s; }
    .reveal.d3 { animation-delay: 0.18s; }
    .reveal.d4 { animation-delay: 0.24s; }
    .reveal.d5 { animation-delay: 0.30s; }
    .reveal.d6 { animation-delay: 0.36s; }
    .reveal.d7 { animation-delay: 0.42s; }
    .reveal.d8 { animation-delay: 0.48s; }

    /* ── PAGE WRAPPER ── */
    #team-page {
      padding: 60px 5% 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 56px;
      padding: 40px 0 0;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 14px;
    }

    .page-title {
      font-weight: 900;
      font-size: clamp(2.4rem, 5vw, 3.4rem);
      margin: 0 auto 16px;
      font-family: var(--font-primary);
      /* Gold gradient matching index.html */
      background: linear-gradient(90deg, #ffd748 0%, #D4AF37 40%, #FFD700 70%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }


    .page-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      max-width: 480px;
      line-height: 1.7;
      margin: 0 auto;
    }

    /* ── DIVIDER ── */
    .section-divider {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
    }

    .gold-divider {
      width: 90%;
      max-width: 1100px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
      border: none;
      margin: 50px auto;
    }


    /* ── SECTION HEADING ── */
    .sub-section-header {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .sub-section-header h2 {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--gold);
      margin: 0;
      white-space: nowrap;
    }

    .sub-section-header .rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(212,175,55,0.35), transparent);
    }

    /* ── LEADERSHIP GRID ── */
    .leadership-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto 50px;
    }

    /* ── MEMBER GRID ── */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── MEMBER CARD BASE ── */
    .member-card {
  /* 1. Gradient background to simulate light hitting one corner */
  border-radius: 16px;
  overflow: hidden;
  text-align: center;
  position: relative;
  
  /* 2. Keep specialized properties not in the base glass class */
  background-clip: padding-box; 
}

.member-card:hover {
  transform: translateY(-12px) scale(1.02);
  
  /* 4. Gold "Energy" Glow */
  border-color: rgba(212, 175, 55, 0.6);
  background: rgba(255, 255, 255, 0.15);
  
  box-shadow: 
    inset 0 1px 2px rgba(255, 255, 255, 0.5),
    0 20px 40px rgba(0, 0, 0, 0.3),
    0 0 15px rgba(212, 175, 55, 0.15); /* Soft gold aura */
}


    .member-card img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: transform 0.5s ease, opacity 0.3s ease;
      opacity: 0.88;
    }

    .member-card:hover img {
      transform: scale(1.04);
      opacity: 1;
    }

    /* Leadership card taller photo */
    .leadership-grid .member-card img {
      height: 270px;
    }

    .member-info {
      padding: 14px 16px 18px;
    }

    .member-info h3 {
      margin: 0 0 6px;
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1rem;
      color: #fff;
      line-height: 1.2;
    }

    /* ── ROLE BADGE ── */
    .role-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Leadership - Amber Glass */
.role-badge.leadership {
  background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.05));
  border: 1px solid rgba(212, 175, 55, 0.5);
  color: #fff; /* White text pops better on tinted glass */
  text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
}

/* Software - Sapphire Glass */
.role-badge.software {
  background: linear-gradient(135deg, rgba(56, 189, 248, 0.25), rgba(56, 189, 248, 0.05));
  border: 1px solid rgba(56, 189, 248, 0.4);
  color: #fff;
  text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
}

/* Hardware - Citrine/Orange Glass */
.role-badge.hardware {
  background: linear-gradient(135deg, rgba(251, 146, 60, 0.25), rgba(251, 146, 60, 0.05));
  border: 1px solid rgba(251, 146, 60, 0.4);
  color: #fff;
  text-shadow: 0 0 8px rgba(251, 146, 60, 0.5);
}

/* Marketing - Amethyst Glass */
.role-badge.marketing {
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.25), rgba(167, 139, 250, 0.05));
  border: 1px solid rgba(167, 139, 250, 0.4);
  color: #fff;
  text-shadow: 0 0 8px rgba(167, 139, 250, 0.5);
}


    /* ── HISTORY SECTION ── */
    .history-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .history-item {
  /* 1. Use a gradient for better light simulation */
  margin-bottom: 16px;
  border-radius: 16px;
  overflow: hidden;
}

.history-item:hover {
  border-color: rgba(212, 175, 55, 0.4);
  background: rgba(255, 255, 255, 0.12);
  transform: translateY(-2px);
  box-shadow: 
    inset 0 1px 2px rgba(255, 255, 255, 0.4),
    0 8px 20px rgba(0, 0, 0, 0.2);
}

.history-item.open {
  /* 4. Amber glass effect when open */
  border-color: rgba(212, 175, 55, 0.6);
  background: linear-gradient(
    135deg, 
    rgba(212, 175, 55, 0.15) 0%, 
    rgba(212, 175, 55, 0.05) 100%
  );
  
  /* 5. Inner and outer gold glow */
  box-shadow: 
    inset 0 1px 2px rgba(255, 255, 255, 0.4),
    inset 0 0 15px rgba(212, 175, 55, 0.1),
    0 10px 30px rgba(212, 175, 55, 0.15);
}


    /* ── ACCORDION HEADER ── */
    .year-header {
      display: flex;
      align-items: center;
      padding: 22px 28px;
      cursor: pointer;
      user-select: none;
      gap: 16px;
    }

    .chevron {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      stroke: var(--gold);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .history-item.open .chevron { transform: rotate(90deg); }

    .year-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--gold);
      flex: 1;
    }

    /* Worlds badge on header */
    .worlds-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 100px;
  flex-shrink: 0;

  /* 2. Keep the "Gold Etched" Styling */
  color: #fff !important; 
  text-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
  font-size: 0.68rem;
  font-weight: 800; 
  letter-spacing: 1.5px;
  text-transform: uppercase;

  /* 3. Keep ONLY the unique Golden tint */
  background: linear-gradient(135deg, rgba(212, 175, 55, 0.35) 0%, rgba(212, 175, 55, 0.05) 100%);
  border: 1px solid rgba(212, 175, 55, 0.6);
}


    .worlds-badge svg {
      width: 11px; height: 11px;
      fill: var(--gold2);
    }

    /* ── ACCORDION BODY ── */
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .accordion-inner {
      padding: 4px 28px 28px 28px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .season-desc {
      font-size: 0.97rem;
      color: rgba(255,255,255,0.72);
      line-height: 1.75;
      margin: 0 0 22px;
      padding-top: 18px;
    }

    /* ── AWARDS ── */


    .awards-heading {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .awards-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212,175,55,0.25);
    }

    .awards-event {
      margin-bottom: 14px;
    }

    .event-name {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .award-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #fff;

  /* 2. Keep ONLY the unique "Wet" Highlight */
  background: radial-gradient(
    circle at 30% 30%, 
    rgba(255, 255, 255, 0.15) 0%, 
    rgba(212, 175, 55, 0.1) 100%
  );
  
  /* Keep the specific border opacity if you want it to pop more than standard cards */
  border: 1px solid rgba(255, 255, 255, 0.25);
}

/* 1st Place - Liquid Gold */
.award-pill.first {
  background: radial-gradient(
    circle at 30% 30%, 
    rgba(255, 255, 255, 0.25) 0%, 
    rgba(212, 175, 55, 0.2) 100%
  );
  
  /* 2. Keep the specific Gold border color */
  border-color: rgba(212, 175, 55, 0.7);

  /* 3. Keep ONLY the outer gold glow (remove the inset) */
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.25);
}

.award-pill .place {
  /* Make the rank look etched into the liquid */
  color: #D4AF37; 
  font-weight: 900;
  text-shadow: 0 0 5px rgba(212, 175, 55, 0.4);
}

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .leadership-grid { grid-template-columns: repeat(3, 1fr); }
      .member-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .leadership-grid { grid-template-columns: repeat(2, 1fr); }
      .member-grid { grid-template-columns: repeat(2, 1fr); }

    }
    @media (max-width: 420px) {
      .leadership-grid, .member-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="nav-mount"></div>

  <main id="team-page">

    <!-- ── PAGE HEADER ── -->
    <header class="page-header">
      <h1 class="page-title reveal d1">MEET THE TEAM</h1>
    </header>

    <!-- ── LEADERSHIP ── -->
    <div class="sub-section-header reveal">
      <h2>Leadership</h2>
      <div class="rule"></div>
    </div>

    <div class="leadership-grid">
    </div>

    <hr class="gold-divider reveal">

    <!-- ── MEMBERS ── -->
    <div class="sub-section-header reveal">
      <h2>Members</h2>
      <div class="rule"></div>
    </div>

    <div class="member-grid">
      
    </div>

    <hr class="gold-divider reveal">

    <!-- ── TEAM HISTORY ── -->
    <div class="sub-section-header reveal">
      <h2>Team History</h2>
      <div class="rule"></div>
    </div>

    <div class="history-container">

      <div id="history-container"></div>

    </div>
  </main>

  <div class="section-divider"></div>

  <div id="footer-mount"></div>

<script src="teamhistory.js"></script>
<script src="team.js"></script>

  <script>
    function initializeComponents() {
      if (typeof renderNav === 'function' && typeof renderFooter === 'function') {
        renderNav('team');
        renderFooter();
      } else {
        setTimeout(initializeComponents, 100);
      }
    }
    document.addEventListener('DOMContentLoaded', initializeComponents);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    function toggleAccordion(item) {
      const body = item.querySelector('.accordion-body');
      const inner = item.querySelector('.accordion-inner');
      const isOpen = item.classList.contains('open');

      // Close all others
      document.querySelectorAll('.history-item.open').forEach(openItem => {
        if (openItem !== item) {
          openItem.classList.remove('open');
          openItem.querySelector('.accordion-body').style.maxHeight = '0';
        }
      });

      if (isOpen) {
        item.classList.remove('open');
        body.style.maxHeight = '0';
      } else {
        item.classList.add('open');
        body.style.maxHeight = inner.scrollHeight + 'px';
      }
    }

    // ── Scroll reveal

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    });
    
  </script>
</body>
</html>
